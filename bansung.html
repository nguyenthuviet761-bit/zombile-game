<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOMBIE SQUAD ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #00d4ff; --red: #ff4757; --green: #2ecc71; --gold: #f1c40f; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: none; background: #0a0a0a; }

        /* MENU HỆ THỐNG */
        #menu { position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://wallpaperaccess.com/full/1556117.jpg') center/cover; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .menu-card { background: rgba(20,20,20,0.9); padding: 40px; border-radius: 20px; border: 2px solid var(--blue); box-shadow: 0 0 30px var(--blue); text-align: center; width: 300px; }
        h1 { color: var(--blue); font-size: 32px; margin: 0 0 20px; text-shadow: 0 0 10px var(--blue); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--blue); color: #000; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* UI TRẬN ĐẤU */
        #game-ui { position: absolute; top: 15px; left: 15px; pointer-events: none; display: none; }
        .stat-tag { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; margin-bottom: 5px; border-left: 4px solid var(--blue); font-size: 14px; font-weight: bold; }
        
        /* MINI MAP */
        #radar { position: absolute; top: 15px; right: 15px; width: 130px; height: 130px; background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 8px; display: none; }

        /* CHAT SQUAD */
        #chat-box { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 300px; display: none; }
        #messages { height: 60px; overflow: hidden; font-size: 11px; color: var(--green); text-shadow: 1px 1px 1px #000; }

        /* CONTROLS (Ngang) */
        .ctrl { position: absolute; border-radius: 50%; display: none; }
        #move-joy { bottom: 40px; left: 60px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid rgba(0,212,255,0.2); }
        #move-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: var(--blue); opacity: 0.4; border-radius: 50%; }
        #fire-btn { bottom: 50px; right: 60px; width: 90px; height: 90px; background: rgba(255,71,87,0.3); border: 2px solid var(--red); display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
        
        /* BOSS ALERT */
        #boss-warning { position: absolute; top: 30%; width: 100%; text-align: center; color: var(--red); font-size: 40px; font-weight: 900; display: none; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-card">
            <h1>ZOMBIE SQUAD</h1>
            <input type="text" id="name-in" placeholder="Tên chiến binh..." maxlength="10">
            <input type="text" id="team-in" placeholder="Mã Đội (để mời bạn)..." maxlength="6">
            <button onclick="enterGame()">BẮT ĐẦU</button>
            <p style="font-size:10px; color:#666; margin-top:15px;">Xoay ngang màn hình | PC: WASD + Mouse</p>
        </div>
    </div>

    <div id="game-ui">
        <div class="stat-tag">SQUAD: <span id="ui-team" style="color:var(--green)">-</span></div>
        <div class="stat-tag">HP: <span id="ui-hp">100</span>% | SCORE: <span id="ui-score">0</span></div>
    </div>

    <div id="boss-warning">BOSS ĐANG ĐẾN!</div>
    <div id="radar-container"><canvas id="radar" width="130" height="130"></canvas></div>

    <div id="move-joy" class="ctrl"><div id="move-stick"></div></div>
    <div id="fire-btn" class="ctrl">FIRE</div>

    <div id="chat-box">
        <div id="messages"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = { databaseURL: "https://bansungonline.web.app/" };
        let db; try { firebase.initializeApp(firebaseConfig); db = firebase.database(); } catch(e){}

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const radarCanvas = document.getElementById('radar');
        const radarCtx = radarCanvas.getContext('2d');
        
        const myId = "u_" + Math.random().toString(36).substr(2, 5);
        let player = { x: 1000, y: 1000, ang: 0, score: 0, hp: 100, name: "", team: "", bullets: [] };
        let others = {}, zombies = [], particles = [];
        let isStarted = false, isMobile = /Mobi|Android/i.test(navigator.userAgent);
        let moveVec = { x: 0, y: 0 };
        const keys = {};

        function enterGame() {
            player.name = document.getElementById('name-in').value || "Soldier";
            player.team = document.getElementById('team-in').value || "Solo";
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('radar').style.display = 'block';
            document.getElementById('chat-box').style.display = 'block';
            document.getElementById('ui-team').innerText = player.team;
            canvas.style.display = 'block';
            if(isMobile) { 
                document.getElementById('move-joy').style.display = 'block';
                document.getElementById('fire-btn').style.display = 'flex';
            }
            isStarted = true;
            spawnZ(); loop();
        }

        // --- 2. CONTROLS ---
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        window.onmousemove = e => { if(isStarted) player.ang = Math.atan2(e.clientY - player.y, e.clientX - player.x); };
        window.onclick = () => { if(isStarted && !isMobile) shoot(); };

        // Joystick
        const joy = document.getElementById('move-joy');
        const stick = document.getElementById('move-stick');
        joy.addEventListener('touchmove', e => {
            const t = e.touches[0]; const r = joy.getBoundingClientRect();
            const dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
            const d = Math.min(Math.hypot(dx,dy), 45); const a = Math.atan2(dy,dx);
            moveVec = {x: Math.cos(a)*(d/45), y: Math.sin(a)*(d/45)};
            stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            player.ang = a;
        });
        joy.addEventListener('touchend', () => { moveVec = {x:0, y:0}; stick.style.transform = 'none'; });
        document.getElementById('fire-btn').addEventListener('touchstart', e => { e.preventDefault(); shoot(); });

        function shoot() {
            player.bullets.push({x: player.x, y: player.y, vx: Math.cos(player.ang)*14, vy: Math.sin(player.ang)*14});
        }

        // --- 3. ZOMBIE LOGIC ---
        function spawnZ() {
            if(!isStarted) return;
            let isBoss = (player.score > 0 && player.score % 2000 === 0);
            if(isBoss) {
                document.getElementById('boss-warning').style.display = 'block';
                setTimeout(()=>document.getElementById('boss-warning').style.display='none', 3000);
            }
            zombies.push({
                x: player.x + (Math.random()-0.5)*2000, 
                y: player.y + (Math.random()-0.5)*2000, 
                hp: isBoss?50:2, r: isBoss?50:18, spd: isBoss?1.5:2.5, boss: isBoss
            });
            setTimeout(spawnZ, Math.max(500, 2000 - player.score/10));
        }

        // --- 4. GAME LOOP ---
        function loop() {
            if(!isStarted) return;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            
            // Movement
            let speed = 5;
            if(moveVec.x || moveVec.y) { player.x += moveVec.x*speed; player.y += moveVec.y*speed; }
            else {
                if(keys['KeyW']) player.y -= speed; if(keys['KeyS']) player.y += speed;
                if(keys['KeyA']) player.x -= speed; if(keys['KeyD']) player.x += speed;
            }

            // Sync
            if(db) {
                db.ref('squad/'+myId).set(player);
                db.ref('squad').on('value', s => others = s.val() || {});
            }

            ctx.clearRect(0,0,canvas.width,canvas.height);

            // Zombies
            zombies.forEach((z, zi) => {
                let a = Math.atan2(player.y - z.y, player.x - z.x);
                z.x += Math.cos(a)*z.spd; z.y += Math.sin(a)*z.spd;
                ctx.fillStyle = z.boss ? "red" : "#4caf50";
                ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI*2); ctx.fill();
                
                if(Math.hypot(player.x-z.x, player.y-z.y) < z.r + 15) {
                    player.hp -= 0.3; if(player.hp <= 0) location.reload();
                }

                player.bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x-z.x, b.y-z.y) < z.r) {
                        z.hp--; player.bullets.splice(bi,1);
                        if(z.hp<=0) { zombies.splice(zi,1); player.score += z.boss?1000:20; }
                    }
                });
            });

            // Players
            for(let id in others) {
                let p = others[id];
                let isSameTeam = (p.team === player.team && p.team !== "Solo");
                
                ctx.save();
                ctx.translate(p.x, p.y);
                
                // Name & HP Bar
                ctx.fillStyle = isSameTeam ? "#2ecc71" : "#fff";
                ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
                ctx.fillText(`${p.name}`, 0, -35);
                ctx.fillStyle = "#333"; ctx.fillRect(-15, -30, 30, 4);
                ctx.fillStyle = isSameTeam ? "#2ecc71" : "#00d4ff"; 
                ctx.fillRect(-15, -30, (p.hp/100)*30, 4);

                ctx.rotate(p.ang);
                ctx.fillStyle = id === myId ? "#00d4ff" : (isSameTeam ? "#2ecc71" : "#fff");
                ctx.fillRect(-15, -15, 30, 30);
                ctx.fillStyle = "#444"; ctx.fillRect(12, -5, 18, 10);
                ctx.restore();

                if(p.bullets) p.bullets.forEach(b => {
                    ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
                });
            }

            // Radar
            radarCtx.fillStyle = "rgba(0,0,0,0.8)"; radarCtx.fillRect(0,0,130,130);
            zombies.forEach(z => {
                radarCtx.fillStyle = "red"; radarCtx.fillRect(65 + (z.x-player.x)/20, 65 + (z.y-player.y)/20, 3, 3);
            });
            for(let id in others) {
                radarCtx.fillStyle = others[id].team === player.team ? "#0f0" : "#fff";
                radarCtx.fillRect(65 + (others[id].x-player.x)/20, 65 + (others[id].y-player.y)/20, 4, 4);
            }

            document.getElementById('ui-hp').innerText = Math.floor(player.hp);
            document.getElementById('ui-score').innerText = player.score;
            player.bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(Math.hypot(b.x-player.x, b.y-player.y) > 1000) player.bullets.splice(i,1);
            });

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
